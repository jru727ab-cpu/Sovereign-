# Copilot Coding Agent – environment bootstrap
# Runs BEFORE the network firewall is enabled so we can download
# the Android SDK, Gradle distribution, and other build-time deps.

name: "Copilot Setup Steps"

on: repository_dispatch

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Pre-download Android SDK & dependencies
        run: |
          if [ -f gradlew ]; then
            chmod +x gradlew
            ./gradlew :app:dependencies --stacktrace || true
          fi
